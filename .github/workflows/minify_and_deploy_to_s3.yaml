name: Deploy Static Files to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build and Minify JS/CSS
        # This outputs your minified code and unminified public files to the 'dist' folder
        run: npm run build

      - name: Minify standalone JSON files
        # Uses 'jq' (pre-installed on Ubuntu runners) to compress any JSON files in the dist directory
        run: |
          find dist -name "*.json" -exec bash -c 'jq -c . "$1" > temp.json && mv temp.json "$1"' _ {} \;

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3 Bucket
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete 