name: Minify and Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build directory
        # Creates a dist folder and copies the contents of your static folder directly into it
        run: |
          mkdir dist
          cp -r static/* dist/

      - name: Minify JS and CSS 
        # Uses esbuild to find and minify all JS and CSS files in-place
        # The '--yes' flag ensures the CI doesn't pause to ask for installation permission
        run: |
          find dist -name "*.js" -exec npx --yes esbuild@latest {} --minify --allow-overwrite --outfile={} \;
          find dist -name "*.css" -exec npx --yes esbuild@latest {} --minify --allow-overwrite --outfile={} \;

      - name: Minify JSON
        # Uses pre-installed jq to find and compress all JSON files in-place (if you add any later)
        run: |
          find dist -name "*.json" -exec bash -c 'jq -c . "$1" > temp.json && mv temp.json "$1"' _ {} \;

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        # Syncs the dist folder to your bucket, deleting files on S3 that no longer exist in your repo
        # run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }}/static/ --delete